<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Feed</title>

<style>
body{
    margin:0;
    background:#0f0f0f;
    font-family:Arial;
    color:white;
}
.grid{
    display:grid;
    grid-template-columns:1fr;
    gap:10px;
    padding:10px;
    padding-bottom:70px;
}
.video-card{
    display:flex;
    gap:10px;
    background:#1a1a1a;
    padding:8px;
    border-radius:12px;
    cursor:pointer;
}
.thumb{
    position:relative;
    width:140px;
    flex-shrink:0;
}
.thumb video{
    width:100%;
    height:90px;
    object-fit:cover;
    border-radius:10px;
}
.play-overlay{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    font-size:26px;
    background:rgba(0,0,0,0.6);
    border-radius:50%;
    padding:6px 10px;
}
.title{
    font-size:13px;
    color:#ddd;
    line-height:1.3;
}
.navbar{
    position:fixed;
    bottom:0;
    left:0;
    width:100%;
    background:#111;
    display:flex;
    justify-content:space-around;
    padding:10px 0;
    border-top:1px solid #222;
}
.navbar div{
    font-size:12px;
    opacity:0.7;
}
.navbar .active{
    opacity:1;
    font-weight:bold;
}
#player{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:black;
    display:none;
    justify-content:center;
    align-items:center;
    z-index:999;
    flex-direction:column;
}
#player video{
    width:95%;
    max-width:500px;
}
#closeBtn{
    position:absolute;
    top:15px;
    right:20px;
    font-size:30px;
    cursor:pointer;
}
</style>
</head>

<body>

<div id="app" class="grid"></div>

<div class="navbar">
    <div class="active">Home</div>
    <div>Trending</div>
    <div>Profile</div>
</div>

<div id="player">
    <span id="closeBtn">✕</span>
    <video id="mainVideo" controls playsinline></video>
</div>

<script>
const ad = "https://otieu.com/4/10005133";

const videoList = [
  ["https://cdn2.videy.co/FdOEeVQT1.mp4","📍S3P1 RVM4H M3MBV4T 51TV451 J4D1 T4K T3RK3ND4L1"],
  ["https://cdn2.videy.co/buaNjIZh1.mp4","📍K3J4D14N 4W4LNY4 B1454 B3RVB4H J4D1 T3G4NG"],
  ["https://cdn2.videy.co/o3BPPncu1.mp4","📍D14M D14M K0ND151 B3RVJ0NG P4N45 D1 M4L4M H3N1NG"],
  ["https://cdn2.videy.co/Ezt8O8PA1.mp4","📍S4L4H L4NGK4H K3C1L B3RVJ0NG P4D4 K3J4D14N B3S4R"],
  ["https://cdn2.videy.co/uS4eJSMe1.mp4","📍T1D4K D1R3NC4N4 T4P1 T3RJ4D1 D1 W4KT0 Y4NG S4L4H"],
  ["https://cdn2.videy.co/WKa7SRkt1.mp4","📍M0M3N 51NGK4T Y4NG M3MBV4T P1K1R4N K4CVV"],
  ["https://cdn2.videy.co/Bt2mfzX41.mp4","📍K3P1NCVT 4W4LNY4 B1454 B3RVJ0NG J4D1 K3B14544N"],
  ["https://cdn2.videy.co/nWOEbXGu1.mp4","📍S44T S3MV4 T3RL3N4 K0ND151 M4L4H B3RVB4H"],
  ["https://cdn2.videy.co/uwCAvSln1.mp4","📍D1 B4L1K K3H3N1NG4N 4D4 K3J4D14N T4K T3RC4T4T"],
  ["https://cdn2.videy.co/P6ZGN8hN1.mp4","📍M4L4M P4NJ4NG Y4NG M3MBV4T S3M4NY4 T4K 54M4"],
  ["https://cdn2.videy.co/TuC2Ip3b1.mp4","📍S4L4H K0ND151 D4N S4L4H K3PVTV54N B3RVJ0NG T3G4NG"],
  ["https://cdn2.videy.co/0Mxm0gUx1.mp4","📍K3J4D14N D14M D14M Y4NG T4K B154 D1LVP4K4N"],
  ["https://cdn2.videy.co/UmyrLHIG1.mp4","📍T1D4K 4D4 Y4NG 53D3RH4N D1 M4L4M 1TV"],
  ["https://cdn2.videy.co/BacMmZyf1.mp4","📍M0M3N Y4NG M3MBV4T 4TUR4N J4D1 T4K B3R4RT1"],
  ["https://cdn2.videy.co/wZvNVitX1.mp4","📍K3J4D14N 1N1 M3N1NGG4LK4N B4NY4K T4ND4 T4NY4"]
];

const app = document.getElementById("app");
const player = document.getElementById("player");
const mainVideo = document.getElementById("mainVideo");
const closeBtn = document.getElementById("closeBtn");

videoList.forEach(v => {

    const card = document.createElement("div");
    card.className = "video-card";

    const thumb = document.createElement("div");
    thumb.className = "thumb";

    const vid = document.createElement("video");
    vid.src = v[0];
    vid.muted = true;
    vid.preload = "metadata";
    vid.playsInline = true;

    const play = document.createElement("div");
    play.className = "play-overlay";
    play.innerHTML = "▶";

    thumb.appendChild(vid);
    thumb.appendChild(play);

    const title = document.createElement("div");
    title.className = "title";
    title.innerHTML = v[1];

    card.appendChild(thumb);
    card.appendChild(title);
    app.appendChild(card);

    card.onclick = () => {
        player.style.display = "flex";
        mainVideo.src = v[0];
        mainVideo.currentTime = 0;
        mainVideo.play();

        // IKLAN AWAL (KLIK)
        window.open(ad,"_blank");

        let ad20 = false;
        let ad40 = false;

        mainVideo.ontimeupdate = () => {
            const t = Math.floor(mainVideo.currentTime);

            if(t >= 20 && !ad20){
                ad20 = true;
                window.open(ad,"_blank");
            }

            if(t >= 40 && !ad40){
                ad40 = true;
                window.open(ad,"_blank");
            }
        };
    };
});

closeBtn.onclick = () => {
    mainVideo.pause();
    mainVideo.src = "";
    player.style.display = "none";
};
</script>

</body>
</html>
